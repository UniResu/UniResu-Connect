<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci minha senha - UniResu</title>
    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="auth-container">
        <div class="auth-box">
            <img src="../assets/img/uniresulogo.png" alt="Logo UniResu" class="auth-logo">
            <h1>Esqueci minha senha</h1>
            <p class="auth-subtitle">Digite seu e-mail e enviaremos um link para redefinir sua senha.</p>

            <form id="form-esqueci">
                <label class="form-label">E-mail</label>
                <input type="email" id="input-email" class="form-input" placeholder="seu@email.com" required>

                <button type="submit" class="btn-primary" id="btn-enviar">Enviar link</button>
            </form>

            <p id="msg-feedback" class="msg-feedback" style="display:none;"></p>

            <a href="./login.html" class="auth-link">← Voltar para o login</a>
        </div>
    </div>

    <script src="../assets/js/esqueceusenha.js"></script>
</body>

</html>
